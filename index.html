    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <!-- アイコンフォント Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts（かわいい日本語フォント） -->
    <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Mochiropop+One&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kosugi Maru', sans-serif;
            background: linear-gradient(135deg, #ffeef8 0%, #ffd6e8 100%);
            min-height: 100vh;
        }
        .fancy-title {
            font-family: 'Mochiropop One', sans-serif;
        }
        /* スクロールバーのカスタマイズ */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #fff5f8;
        }
        ::-webkit-scrollbar-thumb {
            background: #ffb7d5;
            border-radius: 3px;
        }
        /* ハートの鼓動アニメーション */
        @keyframes heartPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .pulse-heart {
            animation: heartPulse 1.2s infinite;
        }
        /* ぷかぷか浮かぶアニメーション */
        @keyframes floating {
            0% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-8px) scale(1.02); }
            100% { transform: translateY(0px) scale(1); }
        }
        .float-mimi {
            animation: floating 4s ease-in-out infinite;
        }
    </style>
</head>

                    isBgmPlaying = true;

                    bgmIcon.className = "fa-solid fa-volume-xmark text-xs md:text-sm";

        // Gemini-2.5-flash を利用してレスポンス＆感情＆ご機嫌増減をStructured JSONで取得
        async function fetchAiResponse(userMessage) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${userApiKey}`;
            
            const systemPrompt = "あなたは折れ耳のスコティッシュフォールドの5歳の極めて幼い女の子『ミミちゃん』です。白いお花の髪飾りを付け、ピンク의フリルドレスを着て、いちごのバッグを持っています。ユーザーに非常に甘えており、愛らしく舌足らずな「〜にゃ」「〜だよぉ」「うにゅ…」などの5歳児・子猫風 of 日本語口調で必ずお返事してください。ユーザーの言葉が嬉しければ大喜びし、叱られたり意地悪されると大泣きしたり拗ねたりします。";

            const payload = {
                contents: [{
                    parts: [{ text: `ユーザー：「${userMessage}」` }]
                }],
                systemInstruction: {
                    parts: [{ text: systemPrompt }]
                },
                generationConfig: {
                    responseMimeType: "application/json",
                    responseSchema: {
                        type: "OBJECT",
                        properties: {
                            reply: { type: "STRING", description: "ミミちゃんとしての日本語での甘えた返答。ひらがな多めで非常に幼い口調にする。" },
                            emotion: { type: "STRING", description: "感情タイプ。'normal'、'joy'、'blush'、'angry'、'furious'、'sad'、'crying'、'star'のいずれか" },
                            effect: { type: "INTEGER", description: "ご機嫌度の増減値（整数）。とても嬉しい言葉には+10〜+35、通常の会話は+5〜+10、不快・意地悪・冷たい言葉には-10〜-40" }
                        },
                        required: ["reply", "emotion", "effect"]
                    }
                }
            };

            // 指数バックオフ
            let delay = 1000;
            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(url, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });
                    if (response.ok) {
                        const json = await response.json();
                        const rawText = json.candidates?.[0]?.content?.parts?.[0]?.text;
                        if (rawText) return JSON.parse(rawText);
                    }
                } catch (e) {
                    // バックオフ
                }
                await new Promise(resolve => setTimeout(resolve, delay));
                delay *= 2;
            }
            return null;
        }

        // TTS 音声合成 (Koreをベースにさらに幼さを引き出す)
        async function fetchVoice(text, prompt) {
            const apiKeyToUse = userApiKey || apiKey; 
            if (!apiKeyToUse) return null; // APIキーが未設定の場合はTTSリクエストを安全に回避
            
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKeyToUse}`;
            
            const payload = {
                contents: [{
                    parts: [{ text: `${prompt}：「${text}」` }]
                }],
                generationConfig: {
                    responseModalities: ["AUDIO"],
                    speechConfig: {
                        voiceConfig: {
                            prebuiltVoiceConfig: {
                                voiceName: "Kore" // 若々しく甘いハイクオリティボイス
                            }
                        }
                    }
                },
                // 【修正】APIモデル名を正しく修復
                model: "gemini-2.5-flash-preview-tts"
            };

            let delay = 1000;
            for (let i = 0; i < 3; i++) { // API制限と安定化のため試行を3回に最適化
                try {
                    const response = await fetch(url, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });
                    if (response.ok) {
                        const json = await response.json();
                        const base64Audio = json.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
                        const mimeType = json.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.mimeType || "audio/L16;rate=24000";
                        
                        if (base64Audio) {
                            const rateMatch = mimeType.match(/rate=(\d+)/);
                            const sampleRate = rateMatch ? parseInt(rateMatch[1], 10) : 24000;
                            const pcmBytes = base64ToUint8Array(base64Audio);
                            return pcmToWav(pcmBytes, sampleRate);
                        }
                    }
                } catch (e) {
                    console.log("TTS fetch retry attempt:", i + 1, e);
                }
                await new Promise(resolve => setTimeout(resolve, delay));
                delay *= 2;
            }
            return null;
        }

        function base64ToUint8Array(base64) {
            const binaryString = atob(base64);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            return bytes;
        }

        function pcmToWav(pcmBytes, sampleRate) {
            const buffer = new ArrayBuffer(44 + pcmBytes.length);
            const view = new DataView(buffer);
            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + pcmBytes.length, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(view, 36, 'data');
            view.setUint32(40, pcmBytes.length, true);
            
            const outputBytes = new Uint8Array(buffer);
            outputBytes.set(pcmBytes, 44);
            return new Blob([outputBytes], { type: 'audio/wav' });
        }

        function writeString(view, offset, string) {
            for (let i = 0; i < string.length; i++) {
                view.setUint8(offset + i, string.charCodeAt(i));
            }
        }

            setupScreen.classList.remove('hidden');
        });
    </script>
</body>
